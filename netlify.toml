# https://docs.netlify.com/configure-builds/file-based-configuration/
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: every path serves index.html so React Router handles URLs (no 404 on refresh).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
